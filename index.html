<body>
<div id="app"></div>
<canvas id="sg-canvas" style="display:none"></canvas>
<script>
var OPENROUTER_KEY=''; // Free from openrouter.ai - no credit card needed

// ====== AI CHAT ======
var chatConversation=[];

async function sendChat(){
  var input=S.chatInput.trim();
  if(!input)return;
  stopSpeaking();
  S.chatHistory.push({role:'user',text:input});
  S.chatInput='';S.chatLoading=true;
  render();
  setTimeout(function(){var el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},100);
  var response=await getAIResponse(input);
  S.chatHistory.push({role:'ai',text:response});
  S.chatLoading=false;
  render();
  // Speak the response
  speak(response);
  setTimeout(function(){var el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},100);
}

async function getAIResponse(question){
  OPENROUTER_KEY=store.get('ork')||OPENROUTER_KEY||'';
  var pantry=S.items.length>0?S.items.map(function(i){return i.name+(i.expiry?' (exp:'+i.expiry+')':'');}).join(', '):'empty pantry';
  var expiring=S.items.filter(function(i){return i.expiry&&gd(i.expiry)<=3;}).map(function(i){return i.name;}).join(', ');
  if(!OPENROUTER_KEY){return handleOfflineResponse(question,pantry,expiring);}
  try{
    var systemPrompt='You are a friendly Smart Grocery AI Assistant. Current pantry: '+pantry+'. Expiring soon: '+(expiring||'nothing')+'. Help with groceries, recipes with very detailed step-by-step procedures. Be conversational and friendly.';
    var history=S.chatHistory.slice(-6).map(function(m){return{role:m.role==='user'?'user':'assistant',content:m.text};});
    var r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENROUTER_KEY,'HTTP-Referer':'https://abhiiiii009.github.io','X-Title':'Smart Grocery'},
      body:JSON.stringify({
        model:'deepseek/deepseek-r1:free',
        max_tokens:1000,
        messages:[{role:'system',content:systemPrompt},...history,{role:'user',content:question}]
      })
    });
    var d=await r.json();
    if(d.error){return 'Error: '+d.error.message;}
    return ((d.choices||[])[0]||{}).message.content||'Sorry I could not process that.';
  }catch(e){return handleOfflineResponse(question,pantry,expiring);}
}

function handleOfflineResponse(q,pantry,expiring){
  if(q.includes('expir')){
    if(expiring)return 'Items expiring soon: '+expiring+'. Use them before they go bad!';
    return 'Nothing expiring soon! Your pantry looks good.';}
  if(q.includes('how many')||q.includes('count')){return 'You have '+S.items.length+' items in your pantry.';}
  if(q.includes('hello')||q.includes('hi')){return 'Hello! I am your grocery assistant. Add your free OpenRouter API key in Profile for full AI conversations!';}
  if(q.includes('cook')||q.includes('recipe')){suggestRecipes();return 'Opening recipe suggestions! Tap any recipe to see the full procedure.';}
  if(q.includes('scan')){setTimeout(openScanner,500);return 'Opening scanner!';}
  if(q.includes('add')){S.editId=null;S.form={name:'',category:'Other',quantity:'1',unit:'pcs',expiry:'',mfd:''};S.showAdd=true;render();return 'Opening add item form!';}
  return 'Add your free OpenRouter API key in Profile tab! Get it free at openrouter.ai 😊';}

// ====== VOICE ASSISTANT - HANDS FREE ======
var recognition=null;
var synth=window.speechSynthesis;
var voiceActive=false;
var voiceContinuous=false;
var voiceUtterance=null;

function speak(text,onEnd){
  synth.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.rate=1.0;u.pitch=1.0;u.volume=1.0;
  var voices=synth.getVoices();
  var preferred=voices.find(function(v){return v.lang.includes('en')&&(v.name.includes('Female')||v.name.includes('Google'));});
  if(!preferred)preferred=voices.find(function(v){return v.lang.includes('en');});
  if(preferred)u.voice=preferred;
  voiceUtterance=u;
  u.onend=function(){
    voiceUtterance=null;
    // After speaking, auto-listen again if hands-free mode is on
    if(voiceContinuous&&S.showChat){
      setTimeout(startListening,800);
    }
    if(onEnd)onEnd();
  };
  synth.speak(u);
}

function stopSpeaking(){
  synth.cancel();
  voiceUtterance=null;
}

function toggleHandsFree(){
  voiceContinuous=!voiceContinuous;
  if(voiceContinuous){
    speak('Hands free mode on. I am listening.',function(){startListening();});
  }else{
    stopSpeaking();
    if(recognition){try{recognition.stop();}catch(e){}}
    voiceActive=false;
  }
  render();
}

function openChat(){
  S.showChat=true;
  if(S.chatHistory.length===0){
    S.chatHistory=[{role:'ai',text:'Hi! I am your Smart Grocery AI Assistant!\n\nI can help you with:\n• Checking expiry dates\n• Recipe suggestions with full procedures\n• Grocery advice\n• General questions\n\nTap 🎤 for voice or type below!'}];
  }
  render();
  setTimeout(function(){var el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},100);
}

function closeChat(){
  voiceContinuous=false;
  stopSpeaking();
  if(recognition){try{recognition.stop();}catch(e){}}
  voiceActive=false;
  S.showChat=false;
  render();
}

function startListening(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('Voice not supported. Please use Chrome!');return;
  }
  if(voiceActive)return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='en-IN';
  recognition.interimResults=false;
  recognition.maxAlternatives=1;
  recognition.continuous=false;
  voiceActive=true;
  render();

  recognition.onresult=function(e){
    var said=e.results[0][0].transcript;
    S.chatInput=said;
    voiceActive=false;
    render();
    sendChat();
  };
  recognition.onerror=function(e){
    voiceActive=false;
    if(voiceContinuous)setTimeout(startListening,2000);
    render();
  };
  recognition.onend=function(){
    voiceActive=false;
    render();
  };
  try{recognition.start();}catch(e){voiceActive=false;render();}
}

function openVoice(){
  if(!S.showChat)openChat();
  stopSpeaking();
  startListening();
}

// ====== EXPIRY SCANNER ======
async function captureExpiry(){
  showCap(false);showSkip(false);
  setMsg('Hold still... 3');await new Promise(function(r){setTimeout(r,1000);});
  setMsg('Hold still... 2');await new Promise(function(r){setTimeout(r,1000);});
  setMsg('Hold still... 1');await new Promise(function(r){setTimeout(r,1000);});
  setMsg('Reading dates...');

  var vid=document.getElementById('expiry-vid');
  var canvas=document.getElementById('sg-canvas');
  if(!vid||!canvas){skipExpiry();return;}

  // Full resolution capture
  canvas.width=vid.videoWidth||1280;
  canvas.height=vid.videoHeight||720;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(vid,0,0);
  var b64=canvas.toDataURL('image/jpeg',0.95).split(',')[1];
  stopAllCameras();

  var result={exp:null,mfd:null};

  // Step 1: Try Gemini Vision (free + accurate)
  if(OPENROUTER_KEY){
    setMsg('Reading with AI...');
    result=await tryGeminiVision(b64);
  }

  // Step 2: Tesseract fallback
  if(!result.exp&&!result.mfd){
    setMsg('Trying text recognition...');
    var cw=canvas.width*0.85,ch=canvas.height*0.6;
    var cx=(canvas.width-cw)/2,cy=(canvas.height-ch)/2;
    var c2=document.createElement('canvas');
    c2.width=cw*2;c2.height=ch*2;
    var c2x=c2.getContext('2d');
    c2x.drawImage(canvas,cx,cy,cw,ch,0,0,c2.width,c2.height);
    var id=c2x.getImageData(0,0,c2.width,c2.height);var px=id.data;
    for(var i=0;i<px.length;i+=4){var g=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];var v=g<128?Math.max(0,g-50):Math.min(255,g+50);px[i]=px[i+1]=px[i+2]=v;}
    c2x.putImageData(id,0,0);
    result=await tryTesseractDirect(c2);
  }

  applyDateResult(result);
}

async function tryGeminiVision(b64){
  // OpenRouter free tier doesn't support vision - skip to Tesseract
  return{exp:null,mfd:null};
}

async function tryTesseractDirect(canvas){
  try{
    if(typeof Tesseract==='undefined')return{exp:null,mfd:null};
    var res=await Tesseract.recognize(canvas,'eng',{logger:function(){}});
    var txt=res.data.text;
    return{exp:extractDate(txt,['EXP','EXPIRY','EXPIRATION','BEST BEFORE','USE BY','BBE','BB']),mfd:extractDate(txt,['MFD','MFG','MANUFACTURED','PACKED','PKD','DOM']),source:'OCR'};
  }catch(e){return{exp:null,mfd:null};}
}
var _mem={};
var store={
  get:function(k){try{var v=localStorage.getItem(k);return v!==null?v:(_mem[k]||null);}catch(e){return _mem[k]||null;}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(e){}_mem[k]=v;}
};
function safeJson(s,d){try{var v=JSON.parse(s);return v!==null?v:d;}catch(e){return d;}}

function checkExpiry(){
  if(Notification.permission!=='granted')return;
  var today=new Date();today.setHours(0,0,0,0);
  var last=parseInt(store.get('sg_nl')||'0');
  if(last===today.getTime())return;
  store.set('sg_nl',today.getTime());
  S.items.forEach(function(i){
    if(!i.expiry)return;
    var d=gd(i.expiry);
    if(d===3)notify('Expiring in 3 Days',i.name+' expires in 3 days!');
    else if(d===2)notify('Expiring Soon!',i.name+' expires in 2 days!');
    else if(d===1)notify('Expires Tomorrow!',i.name+' expires tomorrow!');
    else if(d===0)notify('Expires Today!',i.name+' expires TODAY!');
    else if(d<0)notify('Expired!',i.name+' has expired!');
  });
}
function checkSeasonal(){
  var m=new Date().getMonth()+1;
  var last=parseInt(store.get('sg_sm')||'0');
  if(last===m)return;
  store.set('sg_sm',m);
  var tips=SEASONAL[m];
  if(tips&&Notification.permission==='granted')setTimeout(function(){notify('Seasonal Tip!',tips[0]);},3000);
}
function checkAutoDelete(){
  var today=new Date();today.setHours(0,0,0,0);

    if(!i.expiry||gd(i.expiry)>0)return true;
    var exp=new Date(i.expiry);exp.setHours(0,0,0,0);
    var daysExpired=Math.floor((today-exp)/86400000);
    if(daysExpired>=2&&i.popupShown){changed=true;return false;}
    return true;
  });

}

function extractDate(txt,kws){var M={JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12};var u=txt.toUpperCase().replace(/[Oo]/g,'0').replace(/[Il|]/g,'1').replace(/\n/g,' ');var yr=new Date().getFullYear();for(var i=0;i<kws.length;i++){var idx=u.indexOf(kws[i]);if(idx===-1)continue;var after=u.substring(idx+kws[i].length,idx+kws[i].length+40);var d=psd(after,M,yr);if(d)return d;}return psd(u,M,yr);}
function psd(t,M,yr){var m;m=t.match(/(\d{1,2})[\-\/\. ]*(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[\-\/\. ]*(\d{2,4})/);if(m){var y=+m[3];if(y<100)y+=2000;if(y>=2020&&y<=2040)return y+'-'+String(M[m[2]]).padStart(2,'0')+'-'+m[1].padStart(2,'0');}m=t.match(/(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[\-\/\. ]*(\d{2,4})/);if(m){var y=+m[2];if(y<100)y+=2000;if(y>=2020&&y<=2040)return y+'-'+String(M[m[1]]).padStart(2,'0')+'-01';}m=t.match(/(\d{1,2})[\-\/](\d{4})/);if(m&&+m[1]<=12&&+m[2]>=2020&&+m[2]<=2040)return m[2]+'-'+m[1].padStart(2,'0')+'-01';m=t.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);if(m){var y=+m[3];if(y<100)y+=2000;if(y>=2020&&y<=2040&&+m[2]<=12)return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}return null;}

    h+='<div class="sb"><span>🔍</span><input placeholder="Search..." value="'+S.search+'" oninput="S.search=this.value;render()"/></div>';
    if(fil.length===0){h+='<div class="empty"><div class="em">'+(items.length===0?'🛒':'🔍')+'</div><p style="font-weight:800;font-size:16px">'+(items.length===0?'Pantry is empty!':'No results')+'</p></div>';}
    else fil.forEach(function(item){var c=CATS[item.category]||CATS.Other;h+='<div class="card" style="'+(item.expired?'opacity:.75;border-left:3px solid #ff4d4d':'')+'">'+'<div class="ci" style="background:'+c.c+'" onclick="toggleCheck('+item.id+')">'+c.i+'</div>'+'<div style="flex:1;min-width:0;cursor:pointer" onclick="toggleCheck('+item.id+')">'+'<div class="cn" style="'+(item.checked?'text-decoration:line-through;color:#aaa':'')+'">'+item.name+'</div>'+'<div class="cm">'+item.quantity+' '+item.unit+' | '+item.category+'</div>'+(item.mfd?'<div style="font-size:11px;color:#aaa">MFD: '+item.mfd+'</div>':'')+'<div style="margin-top:4px">'+bdg(item.expiry)+'</div></div>'+'<div class="ca"><button class="eb" onclick="editItem('+JSON.stringify(item).replace(/"/g,'&quot;')+')">✏️</button><button class="db" onclick="delItem('+item.id+')">🗑️</button></div></div>';});
  }

  if(S.tab==='alerts'){
    h+='<h2 style="margin:0 0 14px;font-size:17px;font-weight:900">🔔 Expiry Alerts</h2>';
    var ae=items.filter(function(i){return i.expiry&&gd(i.expiry)<=7;}).sort(function(a,b){return gd(a.expiry)-gd(b.expiry);});
    if(ae.length===0){h+='<div class="empty"><div class="em">✅</div><p style="font-weight:800">All good!</p></div>';}
    else ae.forEach(function(item){var c=CATS[item.category]||CATS.Other;var d=gd(item.expiry);h+='<div class="card" style="border-left:4px solid '+(d<=0?'#999':d<=2?'#ff4d4d':d<=5?'#ff9f43':'#ffd43b')+'">'+'<div class="ci" style="background:'+c.c+'">'+c.i+'</div>'+'<div style="flex:1;min-width:0"><div class="cn">'+item.name+'</div><div class="cm">'+item.quantity+' '+item.unit+'</div>'+(item.mfd?'<div style="font-size:11px;color:#aaa">MFD: '+item.mfd+'</div>':'')+'<div style="margin-top:4px">'+bdg(item.expiry)+'</div></div>'+'<button class="eb" onclick="editItem('+JSON.stringify(item).replace(/"/g,'&quot;')+')">Refill</button></div>';});
    h+='<button class="sec-btn" style="margin-top:16px" onclick="store.set(\'sg_nl\',\'0\');checkExpiry();alert(\'Test done!\')">🔔 Test Notifications</button>';
  }

  if(S.tab==='profile'){
    var prof=S.prof;
    h+='<h2 style="margin:0 0 16px;font-size:17px;font-weight:900">👤 Profile</h2>';
    h+='<div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:800;font-size:15px">🏠 Family Name</span><button onclick="S.prof.em=!S.prof.em;sv();render()" style="background:#e8f5e9;border:none;border-radius:10px;padding:5px 12px;font-weight:700;color:#2d6a4f;cursor:pointer;font-family:inherit;font-size:13px">'+(prof.em?'Save':'Edit')+'</button></div>'+(prof.em?'<input value="'+prof.name+'" oninput="S.prof.name=this.value" style="margin:0"/>':'<div style="font-size:20px;font-weight:900;color:#2d6a4f">'+prof.name+'</div>')+'</div>';
    h+='<div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)"><p style="margin:0 0 14px;font-weight:800;font-size:15px">👨‍👩‍👧 Members</p>';
    prof.members.forEach(function(m,i){h+='<div style="display:flex;justify-content:space-between;align-items:center;background:#f7f3ee;border-radius:12px;padding:10px 14px;margin-bottom:8px"><span style="font-weight:700;font-size:14px">👤 '+m+'</span><button onclick="S.prof.members.splice('+i+',1);sv();render()" style="background:#ffeaea;border:none;border-radius:8px;padding:4px 10px;color:#e63946;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px">Remove</button></div>';});
    h+='<div style="display:flex;gap:8px;margin-top:8px"><input placeholder="Add member..." value="'+prof.nm+'" oninput="S.prof.nm=this.value" style="margin:0;flex:1"/><button onclick="if(S.prof.nm.trim()){S.prof.members.push(S.prof.nm.trim());S.prof.nm=\'\';sv();render();}" style="background:#2d6a4f;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px">Add</button></div></div>';
    h+='<div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)"><p style="margin:0 0 10px;font-weight:800;font-size:15px">🤖 AI Key (Free)</p>';
    h+='<div style="background:#e8f5e9;border-radius:12px;padding:12px;margin-bottom:10px"><p style="font-size:12px;color:#2d6a4f;font-weight:700">Get FREE key from openrouter.ai → Sign up → Keys → Create Key (starts with sk-or-...)</p></div>';
    h+='<p class="fl">OpenRouter API Key</p>';
    h+='<input type="password" placeholder="sk-or-..." value="'+OPENROUTER_KEY+'" onchange="OPENROUTER_KEY=this.value;store.set(\'ork\',this.value)"/>';
    h+='<p style="font-size:11px;color:#aaa;margin-top:6px">Saved on your device only. Enables AI chat + expiry scanning.</p></div>';
    h+='<div style="background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)"><p style="margin:0 0 14px;font-weight:800;font-size:15px">📊 Stats</p>';
    [['Total Items',items.length],['Expiring Soon',exp.length],['Collected',chk],['Expired',items.filter(function(i){return i.expired;}).length]].forEach(function(x){h+='<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0"><span style="font-size:14px;color:#666;font-weight:600">'+x[0]+'</span><span style="font-size:14px;font-weight:900;color:#2d6a4f">'+x[1]+'</span></div>';});
    h+='</div>';
  }

  h+='</div><button class="fab" onclick="openScanner()">📷 Scan</button>';
  h+='<button class="voice-btn'+(voiceActive?' listening':'')+'" onclick="openChat()">🤖</button>';

  if(S.showScan){
    h+='<div class="scan-modal"><div class="scan-hdr"><div><h2>'+(S.scanStep==='barcode'?'📷 Scan Barcode':'📅 Scan Expiry')+'</h2><div class="scan-step">'+(S.scanStep==='barcode'?'Step 1 of 2':'Step 2 of 2')+'</div></div><button class="x-btn" onclick="closeScanner()">✕</button></div>';
    h+='<div id="cam-wrap"><div class="frame '+(S.scanStep==='barcode'?'barcode':'expiry')+'"><div class="scanline"></div></div><div class="cam-tip">'+(S.scanStep==='barcode'?'Align barcode in the green box':'Point at MFD and EXP dates on label')+'</div></div>';
    h+='<div class="scan-foot"><div class="smsg" id="smsg">Starting camera...</div><button id="cap-btn" class="cap-btn" onclick="captureExpiry()">📸 Capture Dates</button><button id="skip-btn" class="skip-btn" onclick="skipExpiry()">Skip — Enter Manually</button></div></div>';
  }

  if(S.showSheet){
    var f=S.form,p=S.product;
    h+='<div class="sheet-bg"><div class="sheet"><h3>'+(p&&p.found?'✅ Product Found!':'⚠️ Enter Details')+'</h3>';
    if(p&&p.found)h+='<div class="found-box"><div style="font-weight:900">'+p.name+'</div>'+(p.brand?'<div style="font-size:12px;color:#555">'+p.brand+'</div>':'')+'<div style="font-size:11px;color:#aaa">'+p.barcode+'</div></div>';
    else if(p)h+='<div class="nf-box"><p style="font-size:13px;color:#856404;font-weight:700">Not found ('+p.barcode+'). Enter manually:</p></div>';
    h+='<p class="fl">Item Name</p><input placeholder="e.g. Milk" value="'+f.name+'" oninput="S.form.name=this.value"/>';
    h+='<p class="fl">Category</p><select onchange="S.form.category=this.value">';
    Object.keys(CATS).forEach(function(c){h+='<option'+(c===f.category?' selected':'')+'>'+c+'</option>';});
    h+='</select><div class="row2"><input type="number" placeholder="Qty" value="'+f.quantity+'" oninput="S.form.quantity=this.value" style="flex:1"/><input placeholder="Unit" value="'+f.unit+'" oninput="S.form.unit=this.value" style="flex:2"/></div>';
    if(f.mfd)h+='<p class="fl">MFD ✅</p><input type="date" value="'+f.mfd+'" onchange="S.form.mfd=this.value" class="ok"/>';
    h+='<p class="fl">Expiry '+(f.expiry?'✅ Detected':'⚠️ Enter manually')+'</p><input type="date" value="'+f.expiry+'" onchange="S.form.expiry=this.value" class="'+(f.expiry?'ok':'')+'"/>';
    h+='<button class="main-btn" onclick="addItem()">Add to Pantry ✅</button><button class="sec-btn" onclick="S.showSheet=false;S.product=null;openScanner()">📷 Scan Another</button><button class="sec-btn" onclick="S.showSheet=false;S.product=null;render()">Cancel</button></div></div>';
  }

  if(S.showAdd){
    var f=S.form;
    h+='<div class="mov" onclick="S.showAdd=false;render()"><div class="mo" onclick="event.stopPropagation()"><h3>'+(S.editId?'✏️ Edit Item':'➕ Add Item')+'</h3>';
    h+='<input placeholder="Item name" value="'+f.name+'" oninput="S.form.name=this.value"/>';
    h+='<select onchange="S.form.category=this.value">';
    Object.keys(CATS).forEach(function(c){h+='<option'+(c===f.category?' selected':'')+'>'+c+'</option>';});
    h+='</select><div class="row2"><input type="number" placeholder="Qty" value="'+f.quantity+'" oninput="S.form.quantity=this.value" style="flex:1"/><input placeholder="Unit" value="'+f.unit+'" oninput="S.form.unit=this.value" style="flex:2"/></div>';
    h+='<p class="fl">Expiry Date (optional)</p><input type="date" value="'+f.expiry+'" onchange="S.form.expiry=this.value"/>';
    h+='<button class="main-btn" onclick="addItem()">'+(S.editId?'Save ✅':'Add ✅')+'</button></div></div>';
  }

  if(S.showRecipes){
    h+='<div class="mov" onclick="S.showRecipes=false;render()"><div class="mo" onclick="event.stopPropagation()"><h3>🍳 Recipe Suggestions</h3><p style="font-size:13px;color:#888;margin-bottom:16px">Tap any recipe for full procedure</p>';
    S.recipes.forEach(function(r){
      h+='<div class="recipe-box" style="cursor:pointer;'+(r.priority?'background:#fff3cd;border-color:#ffd43b':'')+'" onclick="S.showRecipes=false;showRecipeDetail(\''+r.name+'\')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center"><div class="recipe-title">'+r.name+'</div><span style="font-size:18px">→</span></div>';
      h+='<div style="display:flex;gap:8px;margin-bottom:8px"><span style="font-size:11px;background:#e8f5e9;color:#2d6a4f;padding:3px 8px;border-radius:8px;font-weight:700">'+r.time+'</span><span style="font-size:11px;background:#e8f0ff;color:#5c35a0;padding:3px 8px;border-radius:8px;font-weight:700">'+r.difficulty+'</span></div>';
      r.ingredients.slice(0,3).forEach(function(i){h+='<div class="recipe-item">• '+i+'</div>';});
      if(r.ingredients.length>3)h+='<div style="font-size:12px;color:#aaa;margin-top:4px">+'+( r.ingredients.length-3)+' more ingredients...</div>';
      h+='<div style="font-size:12px;color:#2d6a4f;font-weight:700;margin-top:8px">Tap to see full recipe →</div>';
      h+='</div>';
    });
    h+='<button class="sec-btn" onclick="S.showRecipes=false;render()">Close</button></div></div>';
  }

  if(S.showRecipeDetail){
    var rd=S.showRecipeDetail;
    h+='<div class="recipe-detail">';
    h+='<div class="rd-hdr"><button onclick="S.showRecipeDetail=null;S.showRecipes=true;render()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:6px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px;margin-bottom:12px">← Back</button>';
    h+='<h2>'+rd.name+'</h2>';
    h+='<div style="display:flex;gap:8px;margin-top:8px"><span style="background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">⏱️ '+rd.time+'</span><span style="background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700">'+rd.difficulty+'</span></div></div>';
    h+='<div class="rd-body">';
    h+='<div class="rd-section"><h3>🛒 Ingredients</h3>';
    rd.ingredients.forEach(function(ing){h+='<div class="rd-ing"><span style="font-size:18px">•</span><span style="font-size:14px;font-weight:600;color:#333">'+ing+'</span></div>';});
    h+='</div>';
    h+='<div class="rd-section"><h3>👨‍🍳 Steps</h3>';
    rd.steps.forEach(function(step,i){h+='<div class="rd-step"><div class="rd-step-num">'+(i+1)+'</div><div class="rd-step-text">'+step+'</div></div>';});
    h+='</div>';
    if(rd.tips){h+='<div class="rd-section"><h3>💡 Tips</h3><div style="background:#fff8e6;border-radius:14px;padding:14px;font-size:14px;color:#555;line-height:1.6">'+rd.tips+'</div></div>';}
    if(OPENROUTER_KEY){h+='<button class="main-btn" onclick="S.chatInput=\'Give me more detailed steps for making '+rd.name+'\';S.showRecipeDetail=null;openChat()">🤖 Ask AI for more details</button>';}
    h+='<button class="sec-btn" onclick="S.showRecipeDetail=null;S.showRecipes=true;render()">← Back to Recipes</button>';
    h+='</div></div>';
  }

  if(S.expiredPopup){
    var ei=S.expiredPopup;
    h+='<div class="popup-bg"><div class="popup"><h3>🚫 Item Expired!</h3><p><b>'+ei.name+'</b> has expired. What would you like to do?</p><div class="popup-btns"><button onclick="refillItem('+ei.id+')" style="background:#e8f5e9;color:#2d6a4f">🔄 Refill</button><button onclick="deleteExpiredItem('+ei.id+')" style="background:#ffeaea;color:#e63946">🗑️ Delete</button></div><p style="font-size:11px;color:#aaa;margin-top:12px;text-align:center">Auto-deletes in 2 days if ignored</p></div></div>';
  }

  if(S.showChat){
    h+='<div class="chat-modal">';
    h+='<div class="chat-hdr"><div><h2>🤖 AI Assistant</h2><p style="color:rgba(255,255,255,.8);font-size:12px">'+(OPENROUTER_KEY?'Powered by OpenRouter AI (Free)':'Add free Gemini key in Profile')+'</p></div>';
    h+='<div style="display:flex;gap:8px;align-items:center">';
    h+='<button onclick="toggleHandsFree()" style="background:'+(voiceContinuous?'#e63946':'rgba(255,255,255,.2)')+';border:none;color:#fff;border-radius:10px;padding:7px 12px;font-weight:800;cursor:pointer;font-family:inherit;font-size:11px" title="Hands Free Mode">'+(voiceContinuous?'🎤 ON':'🎤 OFF')+'</button>';
    h+='<button onclick="closeChat()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:8px 14px;font-weight:800;cursor:pointer;font-family:inherit">✕</button>';
    h+='</div></div>';
    h+='<div class="chat-suggestions">';
    ['What is expiring?','Suggest a recipe','How many items?','Delete expired','Open scanner'].forEach(function(s){
      h+='<button class="chat-sug" onclick="S.chatInput=\''+s+'\';sendChat()">'+s+'</button>';
    });
    h+='</div>';
    h+='<div class="chat-messages" id="chat-messages">';
    S.chatHistory.forEach(function(m){
      h+='<div class="msg-'+(m.role==='user'?'user':'ai')+'">'+m.text.replace(/\n/g,'<br/>')+'</div>';
    });
    if(S.chatLoading)h+='<div class="msg-ai loading">Thinking...</div>';
    h+='</div>';
    // Voice status bar
    if(voiceActive||voiceContinuous||voiceUtterance){
      h+='<div style="background:#2d6a4f;padding:8px 16px;display:flex;justify-content:space-between;align-items:center">';
      h+='<span style="color:#fff;font-size:13px;font-weight:700">'+(voiceActive?'🎤 Listening...':(voiceUtterance?'🔊 Speaking...':'🎤 Hands Free ON'))+'</span>';
      h+='<button onclick="stopSpeaking();voiceContinuous=false;if(recognition){try{recognition.stop();}catch(e){}}voiceActive=false;render()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:4px 12px;font-weight:800;cursor:pointer;font-family:inherit;font-size:12px">⏹ Stop</button>';
      h+='</div>';
    }
    h+='<div class="chat-input-wrap">';
    h+='<button class="chat-mic'+(voiceActive?' active':'')+'" onclick="openVoice()" title="Voice Input">🎤</button>';
    h+='<textarea class="chat-input" id="chat-input" placeholder="Ask me anything..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChat();}" oninput="S.chatInput=this.value">'+S.chatInput+'</textarea>';
    h+='<button class="chat-send" onclick="sendChat()">➤</button>';
    h+='</div></div>';
  }

  h+='<div class="bnav">';
  [['home','🏠','Home'],['alerts','🔔','Alerts'],['profile','👤','Profile']].forEach(function(x){h+='<div class="ni" onclick="S.tab=\''+x[0]+'\';render()"><span class="ni-i">'+x[1]+'</span><span class="ni-l'+(S.tab===x[0]?' a':'')+'"">'+x[2]+'</span>'+(S.tab===x[0]?'<div class="ni-d"></div>':'')+'</div>';});
  h+='</div>';

  document.getElementById('app').innerHTML=h;
}

OPENROUTER_KEY=store.get('ork')||'';
render();
initNotifications();
</script>
</body>
</html>
