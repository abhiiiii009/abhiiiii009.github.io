    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);
    const db = getFirestore(app);

    // Register service worker for background notifications
    async function registerSW() {
      if('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('/Smart_grocery-/firebase-messaging-sw.js');
          return reg;
        } catch(e) { console.warn('SW register failed:', e); }
      }
    }

    // Get FCM token and save to Firestore
    window.fcmInit = async function() {
      try {
        await registerSW();
        const token = await getToken(messaging, { vapidKey: VAPID_KEY });
        if(token) {
          console.log('FCM Token:', token);
          // Save token to Firestore
          const tokens = await getDocs(collection(db, 'tokens'));
          const exists = tokens.docs.some(d => d.data().token === token);
          if(!exists) await addDoc(collection(db, 'tokens'), { token, ts: Date.now() });
          window._fcmToken = token;
          window._fcmDb = db;
          window._fcmCollection = collection;
          window._fcmGetDocs = getDocs;
          window._fcmAddDoc = addDoc;
          console.log('✅ FCM registered');
        }
      } catch(e) { console.warn('FCM init error:', e); }
    };

    // Send push to all tokens via Firestore (admin triggers Cloud Function)
    window.sendFCMToAll = async function(title, body) {
      try {
        await addDoc(collection(db, 'push_queue'), { title, body, ts: Date.now(), sent: false });
        console.log('✅ Push queued:', title, body);
      } catch(e) { console.warn('Push queue error:', e); }
    };

    // Listen for foreground messages
    onMessage(messaging, (payload) => {
      console.log('FCM foreground message:', payload);
      const { title, body } = payload.notification || {};
      if(title) {
        try { new Notification(title, { body, icon: 'https://cdn.jsdelivr.net/npm/twemoji@14/2/72x72/1f6d2.png' }); } catch{}
      }
    });

    // Auto init when page loads
    window.addEventListener('load', () => {
      if(Notification.permission === 'granted') window.fcmInit();
    });

<script>
'use strict';

// ============================================================
//  STORAGE
// ============================================================
const _mem = {};
const store = {
  get(k){try{const v=localStorage.getItem(k);return v!==null?v:(_mem[k]??null);}catch{return _mem[k]??null;}},
  set(k,v){try{localStorage.setItem(k,String(v));}catch{}_mem[k]=String(v);}
};
function safeJson(str,def){try{const v=JSON.parse(str);return v!=null?v:def;}catch{return def;}}

// ============================================================
//  CONSTANTS / CATEGORIES
// ============================================================
const CATS = {
  Dairy:{i:'🥛',c:'#f8c8d4'},
  Grains:{i:'🌾',c:'#fde9c0'},
  Vegetables:{i:'🥦',c:'#c8f0d8'},
  Fruits:{i:'🍎',c:'#ffd6f8'},
  Bakery:{i:'🍞',c:'#e0d4f8'},
  Snacks:{i:'🍪',c:'#ffd6b0'},
  Drinks:{i:'🧃',c:'#c8e6f8'},

const SUGGESTIONS = [

  {id:2, text:'💪 Restock proteins — eggs, chicken, lentils or paneer.', tags:['Health','Meal']},

  {id:6, text:'♻️ Tip: Freeze bread before it expires to reduce waste.', tags:['Tip']},
  {id:7, text:'💧 Stay hydrated — stock up on water & fresh juices.', tags:['Health']},
  {id:8, text:'🍪 Healthy snack swap: try nuts, seeds or dried fruits.', tags:['Snacks','Health']},
  {id:9, text:'🍲 Recipe idea: Dal + rice = easy, cheap & nutritious!', tags:['Meal','Tip']},
  {id:10,text:'🥬 Fresh leafy greens are in season — restock today!', tags:['Seasonal','Vegetables']},
];
const ALL_TAGS = [...new Set(SUGGESTIONS.flatMap(s=>s.tags))];

// ============================================================
//  ADMIN MODE — secret URL param
//  Access: yoursite.com?admin=abhi123
//  Change 'abhi123' to your own secret word (keep it private!)
// ============================================================
const ADMIN_SECRET = 'abhi123'; // 🔒 Change this to your own secret
const _isAdmin = new URLSearchParams(window.location.search).get('admin') === ADMIN_SECRET;

// ============================================================
//  STATE  (single declaration)
// ============================================================
const S = {
  items: safeJson(store.get('sg'), []),
  tab: 'home',
  search: '',
  showAdd: false,
  editId: null,
  showScan: false,
  scanStep: 'barcode',   // 'barcode' | 'expiry'
  showSheet: false,
  product: null,
  form: {name:'',category:'Other',quantity:'1',unit:'pcs',expiry:'',mfd:''},
  prof: safeJson(store.get('sgp'), {name:'My Family',members:['Mom','Dad'],nm:'',em:false}),
  // Customer suggestions
  showCust: false,
  custTags: [],
  custMsg: '',
  custSent: false,
};

const sv = () => {
  store.set('sg', JSON.stringify(S.items));
  store.set('sgp', JSON.stringify(S.prof));
};

// ============================================================
//  HELPERS
// ============================================================
const gd = e => {
  if(!e) return 999;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.ceil((new Date(e) - t) / 86400000);
};

const bdg = e => {
  if(!e) return '<span class="badge gr">No expiry</span>';
  const d = gd(e);
  if(d<=0)  return '<span class="badge r">🚫 Expired</span>';
  if(d<=2)  return `<span class="badge r">⚠️ ${d}d left</span>`;
  if(d<=5)  return `<span class="badge o">⚠️ ${d}d left</span>`;
  if(d<=7)  return `<span class="badge y">${d}d left</span>`;
  return `<span class="badge g">${d}d left</span>`;
};

const gc = tags => {
  const s = (tags||[]).join(' ').toLowerCase();
  if(s.includes('dairy')||s.includes('milk'))      return 'Dairy';
  if(s.includes('meat')||s.includes('chicken'))     return 'Meat';
  if(s.includes('bread')||s.includes('bakery'))     return 'Bakery';
  if(s.includes('fruit'))                           return 'Fruits';
  if(s.includes('vegetable'))                       return 'Vegetables';
  if(s.includes('grain')||s.includes('rice'))       return 'Grains';
  if(s.includes('drink')||s.includes('juice'))      return 'Drinks';
  if(s.includes('snack')||s.includes('chip'))       return 'Snacks';
  return 'Other';
};

// ============================================================
//  NOTIFICATIONS
// ============================================================
async function requestNotifPermission() {
  if(!('Notification' in window)) {
    alert('Notifications are not supported on this browser/device.'); return false;
  }
  if(Notification.permission === 'granted') {
    scheduleReminders();
    if(window.fcmInit) window.fcmInit();
    render(); return true;
  }
  if(Notification.permission === 'denied') {
    alert('Notifications are blocked. Please go to your browser Settings → Site Settings and allow notifications for this page.'); return false;
  }
  const p = await Notification.requestPermission();
  if(p === 'granted') {
    scheduleReminders();
    if(window.fcmInit) window.fcmInit();
    render(); return true;
  }
  return false;
}

function sendNotif(title, body, tag) {
  if(Notification.permission !== 'granted') return;
  try { new Notification(title, {body, icon:'https://cdn.jsdelivr.net/npm/twemoji@14/2/72x72/1f6d2.png', tag:tag||title, requireInteraction:false}); }
  catch(e){ console.warn('Notification error:', e); }
}

let _notifTimer = null;
function scheduleReminders() {
  if(_notifTimer) clearInterval(_notifTimer);
  _checkNow();
  _notifTimer = setInterval(_checkNow, 60 * 60 * 1000); // every hour
}

function _checkNow() {
  if(Notification.permission !== 'granted') return;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayMs = today.getTime();
  const lastMs = parseInt(store.get('sg_last_notif') || '0');
  if(lastMs === todayMs) return;   // already ran today
  store.set('sg_last_notif', todayMs);

  S.items.forEach(item => {
    if(!item.expiry) return;
    const d = gd(item.expiry);
    if(d === 3) sendNotif('⚠️ Expiring in 3 Days', `${item.name} expires in 3 days — use it soon!`, 'exp-'+item.id);
    else if(d === 2) sendNotif('⚠️ Expiring Soon', `${item.name} expires in 2 days!`, 'exp-'+item.id);
    else if(d === 1) sendNotif('🟠 Expires Tomorrow', `${item.name} expires TOMORROW!`, 'exp-'+item.id);
    else if(d === 0) sendNotif('🚫 Expires Today', `${item.name} expires TODAY — use it now!`, 'exp-'+item.id);
    else if(d < 0)  sendNotif('❌ Already Expired', `${item.name} has expired. Please remove it.`, 'exp-'+item.id);
  });

  // Monthly seasonal tip
  const month = new Date().getMonth() + 1;
  if(parseInt(store.get('sg_tip_month')||'0') !== month) {
    store.set('sg_tip_month', month);
    const tips = {1:'🥕 Carrot season! Great for immunity',2:'🍓 Strawberry season is starting',3:'🥭 Mango season is here',4:'🥭 Peak mango season — grab them fresh',5:'🍉 Watermelon season is here',6:'🌽 Sweet corn season',7:'🍑 Peak peach season',8:'🍎 Apple season begins',9:'🍎 Fresh apples in stores',10:'🎃 Pumpkin season',11:'🍊 Orange season — boost vitamin C',12:'🍊 Peak orange season — stay healthy'};
    if(tips[month]) setTimeout(() => sendNotif('🛒 Seasonal Tip', tips[month], 'seasonal'), 4000);
  }
}

function sendTestAlert() {
  if(Notification.permission !== 'granted') { requestNotifPermission(); return; }
  // Force re-run by resetting the daily lock
  store.set('sg_last_notif', '0');
  const expItems = S.items.filter(i => i.expiry && gd(i.expiry) <= 5);
  if(expItems.length === 0) {
    sendNotif('✅ Smart Grocery', 'All your items are fresh — nothing expiring soon!', 'test');
  } else {
    expItems.forEach(item => {
      const d = gd(item.expiry);
      sendNotif(
        d <= 0 ? '🚫 Expired' : d <= 2 ? '⚠️ Expiring Soon' : '📅 Expiring',
        `${item.name}: ${d <= 0 ? 'already expired!' : d + ' day(s) left'}`,
        'exp-'+item.id
      );
    });
  }
  setTimeout(() => alert(`🔔 Sent ${Math.max(1,expItems.length)} notification(s)!\nCheck your notification tray.`), 300);
}

let _qrScanner = null;   // Html5Qrcode instance
let _camStream = null;   // MediaStream for expiry cam

function _setMsg(m)  { const el=document.getElementById('smsg'); if(el) el.innerHTML=m; }
function _showCap(v) { const el=document.getElementById('cap-btn'); if(el) el.style.display=v?'block':'none'; }
function _showSkip(v){ const el=document.getElementById('skip-btn'); if(el) el.style.display=v?'block':'none'; }

function stopAllCameras() {
  // Stop html5-qrcode
  if(_qrScanner) {
    try { _qrScanner.stop().catch(()=>{}); } catch{}
    try { _qrScanner.clear(); } catch{}
    _qrScanner = null;
  }
  // Stop raw stream
  if(_camStream) {
    _camStream.getTracks().forEach(t => t.stop());
    _camStream = null;
  }
  // Remove expiry video
  const ev = document.getElementById('expiry-video');
  if(ev) { try{ev.srcObject=null;}catch{} ev.remove(); }
}

//  STEP 1 — BARCODE (html5-qrcode, properly configured)
// ============================================================
function openScanner() {
  stopAllCameras();
  S.showScan = true; S.scanStep = 'barcode';
  S.showSheet = false; S.product = null;
  render();
  setTimeout(_startBarcode, 350);
}

function _startBarcode() {
  const wrap = document.getElementById('cam-wrap');
  if(!wrap) return;

  // Create the qr-reader div that html5-qrcode needs
  let qrDiv = document.getElementById('qr-reader');
  if(!qrDiv) {
    qrDiv = document.createElement('div');
    qrDiv.id = 'qr-reader';
    qrDiv.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
    wrap.insertBefore(qrDiv, wrap.firstChild);
  }

  _setMsg('⏳ Starting camera…');

  _qrScanner = new Html5Qrcode('qr-reader', {verbose: false});

  const config = {
    fps: 15,
    // No qrbox: scan full frame (more reliable for grocery barcodes)
    aspectRatio: wrap.offsetHeight / wrap.offsetWidth || 1.5,
    supportedScanTypes: [
      Html5QrcodeScanType.SCAN_TYPE_CAMERA
    ]
  };

  _qrScanner.start(
    {facingMode: 'environment'},
    config,
    (decoded) => {
      // ✅ Barcode detected
      stopAllCameras();
      _setMsg(`✅ Barcode: ${decoded} — looking up…`);
      _lookupProduct(decoded);
    },
    () => {}  // per-frame error — ignore silently
  ).then(() => {
    _setMsg('📷 Point the barcode at the green box…');
  }).catch(err => {
    console.error('Barcode cam error:', err);
    _setMsg('❌ Camera error — please allow camera access and try again.');
    _showSkip(true);
  });
}

async function _lookupProduct(code) {
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d = await r.json();
    if(d.status === 1 && d.product) {
      const p = d.product;
      S.product = {name: p.product_name || p.product_name_en || '', brand: p.brands || '', barcode: code, found: true};
      S.form = {name: S.product.name, category: gc(p.categories_tags||[]), quantity:'1', unit:'pcs', expiry:'', mfd:''};
    } else {
      S.product = {name:'', brand:'', barcode:code, found:false};
      S.form = {name:'', category:'Other', quantity:'1', unit:'pcs', expiry:'', mfd:''};
    }
  } catch {
    S.product = {name:'', brand:'', barcode:code, found:false};
    S.form = {name:'', category:'Other', quantity:'1', unit:'pcs', expiry:'', mfd:''};
  }
  S.scanStep = 'expiry';
  render();
  setTimeout(_startExpiryCam, 350);
}

// ============================================================
//  STEP 2 — EXPIRY DATE (raw getUserMedia + Tesseract OCR)
// ============================================================
async function _startExpiryCam() {
  _setMsg('⏳ Opening camera…');
  _showCap(false); _showSkip(false);

  // Remove any leftover expiry video
  const old = document.getElementById('expiry-video');
  if(old) { try{old.srcObject=null;}catch{} old.remove(); }

  try {
    _camStream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment', width:{ideal:1920}, height:{ideal:1080}}
    });

    const wrap = document.getElementById('cam-wrap');
    if(!wrap) { stopAllCameras(); return; }

    const vid = document.createElement('video');
    vid.id = 'expiry-video';
    vid.autoplay = true; vid.playsInline = true; vid.muted = true;
    vid.setAttribute('playsinline','');
    wrap.appendChild(vid);
    vid.srcObject = _camStream;
    await vid.play();

    _setMsg('🔍 Camera focusing…');
    await new Promise(r => setTimeout(r, 2000));
    _setMsg('📅 Aim at the expiry/MFD label, then tap <b>Capture</b>');
    _showCap(true); _showSkip(true);
  } catch(e) {
    console.error('Expiry cam error:', e);
    _setMsg('❌ Camera failed. Enter the date manually below.');
    _showSkip(true);
  }
}

async function captureExpiry() {
  _showCap(false); _showSkip(false);

  for(let i=3; i>=1; i--) {
    _setMsg(`📸 Hold still… <b>${i}</b>`);
    await new Promise(r => setTimeout(r, 800));
  }
  _setMsg('📸 Capturing image…');

  const vid = document.getElementById('expiry-video');
  const canvas = document.getElementById('sg-canvas');
  if(!vid || !canvas) { skipExpiry(); return; }

  const vw = vid.videoWidth  || 1280;
  const vh = vid.videoHeight || 720;

  // Crop centre 85% × 65% to focus on label area
  const cw = vw * 0.85, ch = vh * 0.65;
  const cx = (vw - cw) / 2, cy = (vh - ch) / 2;
  canvas.width  = cw * 2.5;   // 2.5× for better OCR quality
  canvas.height = ch * 2.5;
  const ctx = canvas.getContext('2d');

  // Draw scaled-up image
  ctx.drawImage(vid, cx, cy, cw, ch, 0, 0, canvas.width, canvas.height);

  // Step 1: Greyscale
  let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let px = imgData.data;
  for(let i=0; i<px.length; i+=4) {
    const g = 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
    px[i] = px[i+1] = px[i+2] = g;
  }
  ctx.putImageData(imgData, 0, 0);

  // Step 2: Sharpen with convolution kernel
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
  const tCtx = tempCanvas.getContext('2d');
  tCtx.drawImage(canvas, 0, 0);
  const src = tCtx.getImageData(0, 0, canvas.width, canvas.height);
  const dst = ctx.createImageData(canvas.width, canvas.height);
  const kernel = [0,-1,0,-1,5,-1,0,-1,0]; // sharpen kernel
  const w = canvas.width, h = canvas.height;
  for(let y=1; y<h-1; y++) {
    for(let x=1; x<w-1; x++) {
      let r=0;
      for(let ky=-1; ky<=1; ky++) {
        for(let kx=-1; kx<=1; kx++) {
          const idx = ((y+ky)*w + (x+kx))*4;
          r += src.data[idx] * kernel[(ky+1)*3+(kx+1)];
        }
      }
      const di = (y*w+x)*4;
      const v = Math.min(255, Math.max(0, r));
      dst.data[di] = dst.data[di+1] = dst.data[di+2] = v;
      dst.data[di+3] = 255;
    }
  }
  ctx.putImageData(dst, 0, 0);

  // Step 3: Adaptive threshold (binarize) for crisp black/white text
  imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  px = imgData.data;
  const blockSize = 31;
  const half = Math.floor(blockSize/2);
  for(let y=0; y<canvas.height; y++) {
    for(let x=0; x<canvas.width; x++) {
      let sum=0, count=0;
      for(let dy=-half; dy<=half; dy+=3) {
        for(let dx=-half; dx<=half; dx+=3) {
          const ny=y+dy, nx=x+dx;
          if(ny>=0&&ny<canvas.height&&nx>=0&&nx<canvas.width) {
            sum += px[(ny*canvas.width+nx)*4]; count++;
          }
        }
      }
      const threshold = (sum/count) - 10;
      const i = (y*canvas.width+x)*4;
      const val = px[i] < threshold ? 0 : 255;
      px[i] = px[i+1] = px[i+2] = val;
    }
  }
  ctx.putImageData(imgData, 0, 0);

  stopAllCameras();
  _setMsg('🤖 Reading MFD &amp; EXP dates…');

  try {
    // toDataURL works everywhere; Blob URLs can silently fail in some contexts
    const dataUrl = canvas.toDataURL('image/png');
    const result = await Tesseract.recognize(dataUrl, 'eng', {
      logger: ()=>{},
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789/-. :',
      tessedit_pageseg_mode: '6',  // Assume uniform block of text
    });
    let txt = result.data.text;
    console.log('OCR output:', txt);

    // If no dates found, retry with inverted image (white text on dark labels)
    let mfd = _extractDate(txt, ['MFD','MFG','MANUFACTURED','PACKED','PKD','DOM','DATE OF MFG','MFGD','DATE OF MANUFACTURE']);
    let exp = _extractDate(txt, ['EXP','EXPIRY','EXPIRATION','BEST BEFORE','USE BY','BBE','BEST BY','USE BEFORE','EXPIRES','BB']);

    if(!mfd && !exp) {
      _setMsg('🔄 Retrying with inverted image…');
      // Invert the canvas for dark-background labels
      const imgData2 = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const px2 = imgData2.data;
      for(let i=0; i<px2.length; i+=4) { px2[i]=255-px2[i]; px2[i+1]=255-px2[i+1]; px2[i+2]=255-px2[i+2]; }
      ctx.putImageData(imgData2, 0, 0);
      const dataUrl2 = canvas.toDataURL('image/png');
      const result2 = await Tesseract.recognize(dataUrl2, 'eng', { logger: ()=>{}, tessedit_pageseg_mode: '6' });
      txt = result2.data.text;
      console.log('OCR inverted output:', txt);
      mfd = _extractDate(txt, ['MFD','MFG','MANUFACTURED','PACKED','PKD','DOM','DATE OF MFG','MFGD','DATE OF MANUFACTURE']);
      exp = _extractDate(txt, ['EXP','EXPIRY','EXPIRATION','BEST BEFORE','USE BY','BBE','BEST BY','USE BEFORE','EXPIRES','BB']);
    }

    if(exp) {
      S.form.expiry = exp;
      S.form.mfd = mfd || '';
      _setMsg(`✅ ${mfd?'MFD: '+mfd+'  ':''}EXP: ${exp}`);
      setTimeout(() => { S.showScan=false; S.showSheet=true; render(); }, 1200);

    } else if(mfd) {
      const SHELF = {Dairy:7,Meat:4,Bakery:5,Vegetables:7,Fruits:7,Drinks:180,Grains:365,Snacks:180,Other:30};
      const shelfDays = SHELF[S.form.category] || 30;
      const calcDate = new Date(mfd);
      calcDate.setDate(calcDate.getDate() + shelfDays);
      const calcExp = calcDate.toISOString().split('T')[0];
      S.form.mfd = mfd;
      S.form.expiry = calcExp;
      _setMsg(`✅ MFD: ${mfd} → Estimated EXP: ${calcExp}`);
      setTimeout(() => { S.showScan=false; S.showSheet=true; render(); }, 1500);

    } else {
      _setMsg('⚠️ No dates found. Move closer to the label and tap Capture again.');
      _showCap(true); _showSkip(true);
      _startExpiryCam();
    }

  } catch(e) {
    console.error('OCR error:', e);
    _setMsg('❌ OCR failed. Try again or enter date manually.');
    _showCap(true); _showSkip(true);
    _startExpiryCam();
  }
}

// ============================================================
//  DATE EXTRACTION
// ============================================================
const _MONTHS = {JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12};

function _extractDate(raw, keywords) {
  const txt = raw.toUpperCase()
    .replace(/[Oo]/g,'0').replace(/[Il|]/g,'1').replace(/[Ss]/g,'5')
    .replace(/\n/g,' ');

  for(const kw of keywords) {
    const idx = txt.indexOf(kw);
    if(idx === -1) continue;
    const chunk = txt.substring(idx + kw.length, idx + kw.length + 40).trim();
    const d = _parseDate(chunk);
    if(d) return d;
  }
  return _parseDate(txt);  // fallback: first date anywhere in text
}

function _parseDate(t) {
  let m;
  // DD-MON-YYYY  e.g. 15-NOV-2027 or 15/NOV/27
  m = t.match(/(\d{1,2})[\-\/\. ]*(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[\-\/\. ]*(\d{2,4})/);
  if(m){let y=+m[3];if(y<100)y+=2000;if(y>=2020&&y<=2040)return`${y}-${String(_MONTHS[m[2]]).padStart(2,'0')}-${m[1].padStart(2,'0')}`;}

  // MON-YYYY  e.g. NOV-2027 or NOV/27
  m = t.match(/(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)[\-\/\. ]*(\d{2,4})/);
  if(m){let y=+m[2];if(y<100)y+=2000;if(y>=2020&&y<=2040)return`${y}-${String(_MONTHS[m[1]]).padStart(2,'0')}-01`;}

  // MM/YYYY  e.g. 11/2027
  m = t.match(/(\d{1,2})[\-\/](\d{4})/);
  if(m&&+m[1]>=1&&+m[1]<=12&&+m[2]>=2020&&+m[2]<=2040)return`${m[2]}-${m[1].padStart(2,'0')}-01`;

  // DD/MM/YYYY  e.g. 15/11/2027 or 15-11-27
  m = t.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if(m){let y=+m[3];if(y<100)y+=2000;if(y>=2020&&y<=2040&&+m[2]<=12)return`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}

  return null;
}

function addItem() {
  if(!S.form.name.trim()) { alert('Please enter an item name.'); return; }
  const expired = S.form.expiry ? gd(S.form.expiry) <= 0 : false;
  if(S.editId) {
    S.items = S.items.map(i => i.id===S.editId ? {...i,...S.form,expired} : i);
    S.editId = null;
  } else {
    S.items.push({...S.form, id:Date.now(), checked:false, expired});
  }
  S.showAdd = false; S.showSheet = false; S.product = null;
  S.form = {name:'',category:'Other',quantity:'1',unit:'pcs',expiry:'',mfd:''};
  sv(); scheduleReminders(); render();
}

function delItem(id) {
  if(!confirm('Delete this item?')) return;
  S.items = S.items.filter(i=>i.id!==id); sv(); render();
}

function editItem(item) {
  S.editId = item.id;
  S.form = {name:item.name,category:item.category,quantity:item.quantity,unit:item.unit,expiry:item.expiry||'',mfd:item.mfd||''};
  S.showAdd = true; render();
}

function toggleCheck(id) {
  S.items = S.items.map(i=>i.id===id?{...i,checked:!i.checked}:i); sv(); render();
}

            }).join('')}

        <button class="main-btn" onclick="sendTestAlert()" style="margin-top:16px">🔔 Test Alert — Send Now</button>
        ${_isAdmin ? `<button class="main-btn dark" onclick="S.showCust=true;S.custSent=false;S.custTags=[];S.custMsg='';render()" style="margin-top:10px">📣 Send Suggestions to Customers</button>` : ''}
      ` : ''}

      <!-- PROFILE TAB -->
      ${tab==='profile' ? `
        <h2 style="margin:0 0 16px;font-size:17px;font-weight:900">👤 Profile</h2>
        <div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <span style="font-weight:800;font-size:15px">🏠 Family Name</span>
            <button onclick="S.prof.em=!S.prof.em;sv();render()" style="background:#e8f5e9;border:none;border-radius:10px;padding:5px 12px;font-weight:700;color:#2d6a4f;cursor:pointer;font-family:inherit;font-size:13px">${prof.em?'✅ Save':'✏️ Edit'}</button>
          </div>
          ${prof.em ? `<input value="${prof.name}" oninput="S.prof.name=this.value" style="margin:0"/>` : `<div style="font-size:20px;font-weight:900;color:#2d6a4f">${prof.name}</div>`}
        </div>
        <div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
          <p style="margin:0 0 14px;font-weight:800;font-size:15px">👨‍👩‍👧 Family Members</p>
          ${prof.members.map((m,i)=>`
            <div style="display:flex;justify-content:space-between;align-items:center;background:#f7f3ee;border-radius:12px;padding:10px 14px;margin-bottom:8px">
              <span style="font-weight:700;font-size:14px">👤 ${m}</span>
              <button onclick="S.prof.members.splice(${i},1);sv();render()" style="background:#ffeaea;border:none;border-radius:8px;padding:4px 10px;color:#e63946;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px">Remove</button>
            </div>`).join('')}
          <div style="display:flex;gap:8px;margin-top:8px">
            <input placeholder="Add member…" value="${prof.nm}" oninput="S.prof.nm=this.value" style="margin:0;flex:1"/>
            <button onclick="if(S.prof.nm.trim()){S.prof.members.push(S.prof.nm.trim());S.prof.nm='';sv();render()}" style="background:#2d6a4f;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px">Add</button>
          </div>
        </div>
        <div style="background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)">
          <p style="margin:0 0 14px;font-weight:800;font-size:15px">📊 Stats</p>
          ${[['Total Items',items.length],['Expiring Soon',exp.length],['Collected',chk],['Categories',new Set(items.map(i=>i.category)).size]].map(([l,v])=>`
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0">
              <span style="font-size:14px;color:#666;font-weight:600">${l}</span>
              <span style="font-size:14px;font-weight:900;color:#2d6a4f">${v}</span>
            </div>`).join('')}
        </div>
      ` : ''}
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openScanner()">📷 Scan</button>

    <!-- ===== SCAN MODAL ===== -->
    ${showScan ? `
      <div class="scan-modal">
        <div class="scan-hdr">
          <div>
            <h2>${scanStep==='barcode'?'📷 Scan Barcode':'📅 Scan Expiry Date'}</h2>
            <span class="scan-step">${scanStep==='barcode'?'Step 1 of 2 — Barcode':'Step 2 of 2 — Expiry Date'}</span>
          </div>
          <button class="x-btn" onclick="closeScanner()">✕ Close</button>
        </div>
        <div id="cam-wrap">
          <div class="cam-overlay">
            <div class="frame ${scanStep==='barcode'?'barcode':'expiry'}">
              <div class="scanline"></div>
            </div>
          </div>
          <p class="cam-tip">${scanStep==='barcode'?'Align barcode inside the green box':'Hold steady over the MFD/EXP label, then tap Capture'}</p>
        </div>
        <div class="scan-foot">
          <div class="smsg" id="smsg">${scanStep==='barcode'?'⏳ Starting camera…':'⏳ Opening camera…'}</div>
          <button id="cap-btn" class="cap-btn" onclick="captureExpiry()">📸 Capture MFD &amp; EXP</button>
          <button id="skip-btn" class="skip-btn" onclick="skipExpiry()">Skip — Enter Date Manually</button>
        </div>
      </div>` : ''}

    <!-- ===== PRODUCT SHEET ===== -->
    ${showSheet ? `
      <div class="sheet-bg">
        <div class="sheet">
          <h3>${product?.found?'✅ Product Found!':'⚠️ Enter Details'}</h3>
          ${product?.found
            ? `<div class="found-box">
                <div class="fn">${product.name||'(no name)'}</div>
                ${product.brand?`<div class="fb">Brand: ${product.brand}</div>`:''}
                <div class="fc">Barcode: ${product.barcode}</div>
               </div>`
            : `<div class="nf-box"><p style="font-size:13px;color:#856404;font-weight:700">Barcode ${product?.barcode} not in database — please enter details below.</p></div>`}
          <p class="fl">Item Name</p>
          <input placeholder="e.g. Milk, Bread…" value="${form.name}" oninput="S.form.name=this.value"/>
          <p class="fl">Category</p>
          <select onchange="S.form.category=this.value">${Object.keys(CATS).map(c=>`<option ${c===form.category?'selected':''}>${c}</option>`).join('')}</select>
          <div class="row2">
            <input type="number" placeholder="Qty" value="${form.quantity}" oninput="S.form.quantity=this.value" style="flex:1"/>
            <input placeholder="Unit (pcs / kg / L)" value="${form.unit}" oninput="S.form.unit=this.value" style="flex:2"/>
          </div>
          <p class="fl">Expiry Date ${form.expiry?'✅ Detected':'⚠️ Not detected — enter manually'}</p>
          <input type="date" value="${form.expiry}" onchange="S.form.expiry=this.value" class="${form.expiry?'ok':''}"/>
          ${form.mfd?`<p class="fl" style="color:#2d6a4f">MFD Detected: ${form.mfd}</p>`:''}
          <button class="main-btn" onclick="addItem()">✅ Add to Pantry</button>
          <button class="sec-btn" onclick="S.showSheet=false;S.product=null;S.form={name:'',category:'Other',quantity:'1',unit:'pcs',expiry:'',mfd:''};openScanner()">📷 Scan Another</button>
          <button class="sec-btn" onclick="S.showSheet=false;S.product=null;render()">Cancel</button>
        </div>
      </div>` : ''}

    <!-- ===== MANUAL ADD/EDIT MODAL ===== -->
    ${showAdd ? `
      <div class="mov" onclick="S.showAdd=false;render()">
        <div class="mo" onclick="event.stopPropagation()">
          <h3>${S.editId?'✏️ Edit Item':'➕ Add Item'}</h3>
          <input placeholder="Item name" value="${form.name}" oninput="S.form.name=this.value"/>
          <select onchange="S.form.category=this.value">${Object.keys(CATS).map(c=>`<option ${c===form.category?'selected':''}>${c}</option>`).join('')}</select>
          <div class="row2">
            <input type="number" placeholder="Qty" value="${form.quantity}" oninput="S.form.quantity=this.value" style="flex:1"/>
            <input placeholder="Unit" value="${form.unit}" oninput="S.form.unit=this.value" style="flex:2"/>
          </div>
          <p class="fl">Expiry Date (optional)</p>
          <input type="date" value="${form.expiry}" onchange="S.form.expiry=this.value" class="${form.expiry?'ok':''}"/>
          <button class="main-btn" onclick="addItem()">${S.editId?'Save Changes ✅':'Add to Pantry ✅'}</button>
          <button class="sec-btn" onclick="S.showAdd=false;render()">Cancel</button>
        </div>
      </div>` : ''}

    <!-- ===== CUSTOMER SUGGESTIONS MODAL ===== -->
    ${S.showCust ? `
      <div class="mov" onclick="S.showCust=false;render()">
        <div class="mo" onclick="event.stopPropagation()" style="max-height:90vh">
          ${S.custSent ? `
            <div class="success-box">
              <div class="big-icon">📣</div>
              <h3>Suggestion Sent!</h3>
              <p>Your message has been dispatched to customers.</p>
              <button class="main-btn" style="margin-top:20px" onclick="S.showCust=false;render()">Done ✅</button>
            </div>` : `
            <h3>📣 Customer Suggestions</h3>
            <p style="font-size:13px;color:#666;font-weight:600;margin-bottom:14px;line-height:1.5">
              Select preset topics and/or write a custom message, then tap Send.
            </p>

            <p class="fl">Select Topics</p>
            <div style="margin-bottom:4px">
              ${ALL_TAGS.map(t=>`<button class="tag-btn${S.custTags.includes(t)?' sel':''}" onclick="toggleCustTag('${t}')">${t}</button>`).join('')}
            </div>

            ${tagged.length>0 ? `
              <div class="sugg-preview">
                <strong>Preview:</strong><br>
                ${tagged.map(s=>s.text).join('<br>')}
              </div>` : ''}

            <p class="fl">Custom Message (optional)</p>
            <textarea placeholder="Type a custom message to customers…" oninput="S.custMsg=this.value">${S.custMsg}</textarea>

            <button class="main-btn" onclick="sendCustSuggestion()">📤 Send to Customers</button>
            <button class="sec-btn" onclick="S.showCust=false;render()">Cancel</button>
          `}
        </div>
      </div>` : ''}

    <!-- BOTTOM NAV -->
    <div class="bnav">
      ${[['home','🏠','Home'],['alerts','🔔','Alerts'],['profile','👤','Profile']].map(([id,icon,lbl])=>`
        <div class="ni" onclick="S.tab='${id}';render()">
          <span class="ni-i">${icon}</span>
          <span class="ni-l ${tab===id?'a':''}">${lbl}</span>
          ${tab===id?'<div class="ni-d"></div>':''}
        </div>`).join('')}
    </div>
  `;
}

// ============================================================
//  INIT
// ============================================================
render();
if(Notification.permission === 'granted') scheduleReminders();

// PWA install prompt
let _installEvt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _installEvt = e;
  setTimeout(() => { if(confirm('📱 Install Smart Grocery on your home screen?')) _installEvt.prompt(); }, 3000);
});
</script>
</body>
</html>
